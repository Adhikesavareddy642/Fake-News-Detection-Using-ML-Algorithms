<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Fake News Detector</h1>
      <p class="subtitle">Detect news and train custom data.</p>

      {% if not model_found %}
      <div class="message warning">
        Model not found at <code>{{ model_path }}</code>.
      </div>
      {% endif %}

      <section class="card">
        <h2>Detect News</h2>
        <label for="newsText">News Content</label>
        <textarea id="newsText" placeholder="Enter news text..."></textarea>
        <button id="detectBtn">Detect</button>

        <div id="detectResult" class="message success hidden"></div>
        <div id="detectError" class="message error hidden"></div>
      </section>

      <section class="card">
        <h2>Train Custom Data</h2>
        <label for="trainText">Training Text</label>
        <textarea id="trainText" placeholder="Enter one custom training sample..."></textarea>

        <label for="trainLabel">Label</label>
        <select id="trainLabel">
          <option value="REAL">REAL</option>
          <option value="FAKE">FAKE</option>
        </select>

        <button id="trainBtn">Train Custom Data</button>

        <div id="trainResult" class="message success hidden"></div>
        <div id="trainError" class="message error hidden"></div>
      </section>
    </main>

    <script>
      const detectBtn = document.getElementById("detectBtn");
      const newsText = document.getElementById("newsText");
      const detectResult = document.getElementById("detectResult");
      const detectError = document.getElementById("detectError");

      const trainBtn = document.getElementById("trainBtn");
      const trainText = document.getElementById("trainText");
      const trainLabel = document.getElementById("trainLabel");
      const trainResult = document.getElementById("trainResult");
      const trainError = document.getElementById("trainError");

      async function detectNews() {
        detectResult.classList.add("hidden");
        detectError.classList.add("hidden");

        const text = newsText.value.trim();
        if (!text) {
          detectError.textContent = "Please enter news text.";
          detectError.classList.remove("hidden");
          return;
        }

        detectBtn.disabled = true;
        detectBtn.textContent = "Detecting...";

        try {
          const response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "Prediction failed.");
          }

          let output = `Prediction: ${data.label}`;
          if (data.confidence !== null && data.confidence !== undefined) {
            output += ` | Confidence: ${(data.confidence * 100).toFixed(2)}%`;
          }
          detectResult.textContent = output;
          detectResult.classList.remove("hidden");
        } catch (err) {
          detectError.textContent = err.message;
          detectError.classList.remove("hidden");
        } finally {
          detectBtn.disabled = false;
          detectBtn.textContent = "Detect";
        }
      }

      async function trainCustom() {
        trainResult.classList.add("hidden");
        trainError.classList.add("hidden");

        const text = trainText.value.trim();
        const label = trainLabel.value;

        if (!text) {
          trainError.textContent = "Please enter training text.";
          trainError.classList.remove("hidden");
          return;
        }

        trainBtn.disabled = true;
        trainBtn.textContent = "Training...";

        try {
          const samples = [{ text, label }];
          const formData = new FormData();
          formData.append("samples_json", JSON.stringify(samples));

          const response = await fetch("/train", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "Training failed.");
          }

          trainResult.textContent = data.message;
          trainResult.classList.remove("hidden");
        } catch (err) {
          trainError.textContent = err.message;
          trainError.classList.remove("hidden");
        } finally {
          trainBtn.disabled = false;
          trainBtn.textContent = "Train Custom Data";
        }
      }

      detectBtn.addEventListener("click", detectNews);
      trainBtn.addEventListener("click", trainCustom);
    </script>
  </body>
</html>
